services:
  db:
    image: postgres:17
    container_name: todo-db

    environment:
      POSTGRES_USER: harsha
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harsha -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: todo-api

    env_file:
      - .env

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: